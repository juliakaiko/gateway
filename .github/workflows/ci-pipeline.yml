name: CI Pipeline for Spring Boot JAR (Gateway)

on:
  push:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Clone the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Create JWT public key
      - name: Create JWT public key
        run: |
          mkdir -p src/main/resources/keys
          echo "${{ secrets.PUBLIC_KEY }}" > src/main/resources/keys/public.pem
          echo "✅ Public key created"

      # 3. Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # 4. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 5. Build, test and generate JaCoCo report (report is bound to verify phase)
      - name: Build and test with Maven
        run: |
          mvn -B clean verify

      # 6. SonarCloud Scan
      - name: Check JaCoCo
        run: |
          ls -R target/site/jacoco
          cat target/site/jacoco/jacoco.xml | head -20

      - name: SonarCloud Scan
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=juliakaiko_gateway \
            -Dsonar.projectName=gateway \
            -Dsonar.organization=juliakaiko \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.java.binaries=target/classes,target/generated-sources/annotations \
            -Dsonar.java.test.binaries=target/test-classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # 7. Docker Build and Push
      - name: Docker Build and Push
        if: success() && github.ref == 'refs/heads/main'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.TOKEN_FOR_GATEWAY }}
        run: |
          echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker build -t juliakaiko94/gateway:latest .
          docker push juliakaiko94/gateway:latest