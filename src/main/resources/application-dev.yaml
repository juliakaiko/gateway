spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: auth-service-api-docs
              uri: http://localhost:8081
              predicates:
                - Path=/auth/v3/api-docs
              filters:
                - RewritePath=/auth/v3/api-docs, /v3/api-docs

            - id: user-service-api-docs
              uri: http://localhost:8083
              predicates:
                - Path=/api/users/v3/api-docs
              filters:
                - RewritePath=/api/users/v3/api-docs, /v3/api-docs

            - id: order-service-api-docs
              uri: http://localhost:8082
              predicates:
                - Path=/api/items/v3/api-docs
              filters:
                - RewritePath=/api/items/v3/api-docs, /v3/api-docs

            - id: payment-service-api-docs
              uri: http://localhost:8084
              predicates:
                - Path=/api/payments/v3/api-docs
              filters:
                - RewritePath=/api/payments/v3/api-docs, /v3/api-docs

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCircuitBreaker
                    fallbackUri: forward:/fallback/auth

            - id: user-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/users/**,/api/cards/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/items/**,/api/orders/**,/api/order-items/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: orderServiceCircuitBreaker
                    fallbackUri: forward:/fallback/order

            - id: payment-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: paymentServiceCircuitBreaker
                    fallbackUri: forward:/fallback/payment

services:
  authservice:
    url: http://localhost:8081
  orderservice:
    url: http://localhost:8082
  userservice:
    url: http://localhost:8083
  paymentservice:
    url: http://localhost:8084

management:
  endpoint:
    health:
      show-details: always
