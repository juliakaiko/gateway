spring:
  application:
    name: gateway

server:
  port: 8080

logging:
  level:
    com.mymicroservice.gateway: INFO
    org.springframework: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.security: WARN
    reactor.netty: ERROR
    org.springframework.boot.web.embedded.netty: ERROR
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    urls:
      - url: /api-docs
        name: Gateway API
      - url: /auth/v3/api-docs
        name: Auth Service
      - url: /api/users/v3/api-docs
        name: User Service
      - url: /api/items/v3/api-docs
        name: Order Service
      - url: /api/payments/v3/api-docs
        name: Payment Service

cors:
  allowed-origin-patterns:
    - "http://innowise-project.local"
    - "https://innowise-project.local"
    - "http://localhost:3000"
    - "http://127.0.0.1:[*]"
    - "http://frontend"
    - "http://gateway:8080"
  allowed-methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed-headers:
    - "Authorization"
    - "Content-Type"
    - "X-Requested-With"
    - "Accept"
    - "Origin"
    - "Access-Control-Request-Method"
    - "Access-Control-Request-Headers"
  exposed-headers:
    - "Authorization"
    - "Content-Type"
  max-age: 3600
  allow-credentials: true

gateway:
  public-paths:
    paths:
      - /v3/api-docs
      - /api-docs
      - /swagger-ui
      - /swagger-ui/**
      - /actuator
      - /auth/v3/api-docs
      - /api/users/v3/api-docs
      - /api/items/v3/api-docs
      - /api/payments/v3/api-docs
  internal-paths:
    paths:
      - /login
      - /register
      - /auth/refresh
